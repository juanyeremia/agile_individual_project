<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/general_structure.css">
    <link rel="stylesheet" href="./css/quiz.css">
</head>
<body>
    <!-- Header -->
    <header class="header_image">
        <img 
        src="./assets/quiz_header.jpg" 
        alt="Picture of a person taking a quiz." />
        <div class="overlay"></div>
        <h1 class="header_title">QUIZ</h1>
    </header> 

    <!-- Navbar -->
     <div id="navbar-placeholder"></div>
    
    <!-- Content -->
    <main class="temp_border container-lg content_card">
        <!-- Quiz Introduction -->
        <section id="quiz-intro" class="temp_border">
                <h2>Test Your Knowledge</h2>
                <p class="justify_par">
                        This quiz covers the three core web technologies from the tutorial, 
                        HTML, CSS, and JavaScript. There are 12 questions in total. 
                        A score of 70% or above is a pass. Good luck!
                </p>
                <button id="start-btn">Start Quiz</button>
        </section>

        <!-- Quiz Questions (hidden until started) -->
        <section id="quiz-questions" style="display: none;">
            <div id="questions-container"></div>        <!-- Will be injected through quis.js -->
            <button id="submit-btn">Submit Quiz</button>
        </section>

        <!-- Quiz Results (these are hidden until submitted) -->
        <section id="quiz-results" style="display: none;">
            <h2>Your Results</h2>
            <div id="results-container"></div>          <!-- Will be injected through quis.js -->
            <div id="reward-container"></div>           <!-- Will be injected through quis.js -->
            <div id="history-container"></div>          <!-- Will be injected through quis.js -->
            <button id="retry-btn">Try Again</button>
            <button id="clear-history-btn" style="display:none;">Clear History</button>         <!-- Connects to quiz.js to clear history -->
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <!-- This Bootstrap's JS bundle script scans the page for data-bs-* attributes and attaches event listeners to them -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     <!-- Connect page to main.js -->
    <script src="./js/main.js"></script>
    <script src="./js/quiz.js"></script>
</body>
</html>
